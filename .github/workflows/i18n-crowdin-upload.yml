name: Crowdin Upload Action

on:
  workflow_dispatch:
  push:
    paths:
      - 'src/locales/en-US/grafana-metricsdrilldown-app.json'
    branches:
      - main

jobs:
  upload-sources-to-crowdin:
    runs-on: ubuntu-x64
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - name: 'Get vault secrets'
        id: vault-secrets
        uses: grafana/shared-workflows/actions/get-vault-secrets@8a16b96ee18c77596b132a2b8fac70dc6e30fd6b # main
        with:
            # Vault secret paths:
            # - ci/repo/grafana/metrics-drilldown/grafana-frontend-crowdin-token
            repo_secrets: |
                CROWDIN_TOKEN=grafana-frontend-crowdin-token:access_token
      - name: Upload to Crowdin
        uses: grafana/grafana-github-actions/crowdin-upload@3c62d35c5a66e730186a338e45aeb8fa784e2d56 # main
        with:
          crowdin_token: ${{ fromJSON(steps.vault-secrets.outputs.secrets).CROWDIN_TOKEN }}
          crowdin_project_id: 38
